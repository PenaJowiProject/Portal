# ============================================================
# wrangler.toml — Cloudflare Workers deployment config
# 
# CARA DEPLOY:
# 1. npm install -g wrangler
# 2. wrangler login
# 3. Set secrets (JANGAN hardcode di file ini):
#      wrangler secret put GAS_URL
#      wrangler secret put WORKER_SECRET
#      wrangler secret put ALLOWED_ORIGIN
# 4. wrangler deploy
#
# Setelah deploy, URL jadi: https://jowi-api.USERNAME.workers.dev
# Untuk custom domain (api.penabur.id):
#   - Masuk Cloudflare dashboard → Workers → jowi-api → Triggers
#   - Add Custom Domain → api.penabur.id
# ============================================================

name = "jowi-api"
main = "worker.js"
compatibility_date = "2026-01-01"

# Worker berjalan di edge Cloudflare (global, gratis sampai 100k req/hari)
workers_dev = true

# ── KV Namespace untuk rate limiting ──
# Buat dulu via: wrangler kv:namespace create "RATE_LIMIT_KV"
# Lalu isi id di bawah dengan output dari command di atas
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "GANTI_DENGAN_KV_NAMESPACE_ID"
# preview_id = "GANTI_DENGAN_KV_PREVIEW_ID"  # uncomment untuk wrangler dev

# ── Environment variables (non-secret) ──
# Secret (GAS_URL, WORKER_SECRET, ALLOWED_ORIGIN) di-set via:
# wrangler secret put NAMA_SECRET
# Jangan pernah tulis secret di file ini

[vars]
# Tidak ada env var non-secret untuk saat ini

# ── Routes (jika pakai custom domain) ──
# Uncomment setelah domain dikonfigurasi di Cloudflare
# [[routes]]
# pattern = "api.penabur.id/*"
# zone_name = "penabur.id"

# ── Limits ──
[limits]
cpu_ms = 50   # max 50ms CPU per request (lebih dari cukup untuk proxy)

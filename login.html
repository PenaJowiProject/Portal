<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOWI — Masuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F0F2F5;
      --card:      #FFFFFF;
      --primary:   #1A3FAA;   /* biru tua Penabur */
      --primary-h: #1432888;
      --accent:    #E8B800;   /* kuning emas */
      --danger:    #D94040;
      --text:      #1C1C2E;
      --muted:     #6B7280;
      --border:    #E2E5EA;
      --input-bg:  #F8F9FB;
      --shadow:    0 4px 24px rgba(26,63,170,.10);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    /* ── Header strip ── */
    .card-header {
      background: var(--primary);
      padding: 32px 36px 28px;
      position: relative;
    }
    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 36px;
      width: 40px; height: 3px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }
    .brand {
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .brand span { color: var(--accent); }
    .brand-sub {
      font-size: 12px;
      color: rgba(255,255,255,.55);
      margin-top: 4px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    /* ── Body ── */
    .card-body { padding: 32px 36px 36px; }

    .form-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }

    /* ── Field ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 7px;
    }
    .field-wrap { position: relative; }
    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 44px 12px 14px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,63,170,.10);
    }
    .field input.error { border-color: var(--danger); }

    /* eye toggle */
    .eye-btn {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 4px;
      color: var(--muted);
      display: flex; align-items: center;
    }
    .eye-btn:hover { color: var(--text); }
    .eye-btn svg { width: 18px; height: 18px; }

    /* ── Alert box ── */
    .alert {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13.5px;
      color: var(--danger);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .alert.show { display: flex; }
    .alert svg { flex-shrink: 0; width: 16px; height: 16px; margin-top: 2px; }

    /* ── Submit button ── */
    .btn-login {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .2px;
      transition: background .15s, transform .1s;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover:not(:disabled) { background: #1432888; }
    .btn-login:active:not(:disabled) { transform: scale(.98); }
    .btn-login:disabled { opacity: .65; cursor: not-allowed; }

    /* spinner */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { opacity: .8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .card-footer {
      text-align: center;
      padding: 0 36px 24px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="brand">JO<span>W</span>I</div>
    <div class="brand-sub">Yayasan BPK Penabur</div>
  </div>

  <div class="card-body">
    <div class="form-title">Masuk ke sistem</div>

    <div class="alert" id="alertBox" role="alert">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10A8 8 0 1 1 2 10a8 8 0 0 1 16 0zm-8-5a1 1 0 0 1 1 1v4a1 1 0 0 1-2 0V6a1 1 0 0 1 1-1zm0 8a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" clip-rule="evenodd"/>
      </svg>
      <span id="alertMsg"></span>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <div class="field-wrap">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Masukkan username"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="field-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Masukkan password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="eye-btn" id="eyeBtn" aria-label="Tampilkan password">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text">Masuk</span>
      </button>
    </form>
  </div>

  <div class="card-footer">
    Hubungi administrator jika akun Anda terkunci.
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  // ── Redirect kalau sudah login ──
  if (Session.isLoggedIn()) {
    window.location.href = '/dashboard.html';
  }

  // ── Eye toggle ──
  const pwInput = document.getElementById('password');
  const eyeBtn  = document.getElementById('eyeBtn');
  const eyeIcon = document.getElementById('eyeIcon');

  const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  eyeBtn.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type   = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? eyeClosed : eyeOpen;
    eyeBtn.setAttribute('aria-label', show ? 'Sembunyikan password' : 'Tampilkan password');
  });

  // ── Alert helper ──
  function showAlert(msg) {
    const box = document.getElementById('alertBox');
    document.getElementById('alertMsg').textContent = msg;
    box.classList.add('show');
  }
  function hideAlert() {
    document.getElementById('alertBox').classList.remove('show');
  }

  // ── Form submit ──
  const form     = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const usernameInput = document.getElementById('username');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    const username = usernameInput.value.trim();
    const password = pwInput.value;

    // Validasi basic client-side
    if (!username) { showAlert('Username tidak boleh kosong.'); usernameInput.focus(); return; }
    if (!password) { showAlert('Password tidak boleh kosong.'); pwInput.focus(); return; }

    // Loading state
    loginBtn.disabled = true;
    loginBtn.classList.add('loading');

    try {
      const res = await Auth.login(username, password);

      if (!res) {
        showAlert('Tidak dapat terhubung ke server. Periksa koneksi internet Anda.');
        return;
      }

      if (!res.success) {
        showAlert(res.message || 'Login gagal.');
        // Shake animation kalau error
        usernameInput.classList.add('error');
        pwInput.classList.add('error');
        setTimeout(() => {
          usernameInput.classList.remove('error');
          pwInput.classList.remove('error');
        }, 1500);
        return;
      }

      // Sukses — simpan session
      Session.save(res.token, res.user, res.expiredAt);

      // Redirect ke dashboard
      window.location.href = '/dashboard.html';

    } finally {
      loginBtn.disabled = false;
      loginBtn.classList.remove('loading');
    }
  });

  // Clear error state saat user mulai ketik
  [usernameInput, pwInput].forEach(input => {
    input.addEventListener('input', () => {
      input.classList.remove('error');
      hideAlert();
    });
  });
</script>
</body>
</html>
